name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & verify
    runs-on: windows-latest
    # Ensure the main build workflow passes on this commit
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  release:
    name: Create release
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Publish FiiiAssist (WinUI)
        run: >
          dotnet publish FiiiAssist/FiiiAssist.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:PublishSingleFile=false
          --output ./publish/fiiiassist

      - name: Publish FiiiAssist.Cli
        run: >
          dotnet publish FiiiAssist.Cli/FiiiAssist.Cli.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:PublishSingleFile=false
          --output ./publish/fiiiassist-cli

      - name: Zip FiiiAssist
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish/fiiiassist/* -DestinationPath ./fiii-assist-${{ steps.version.outputs.VERSION }}.zip

      - name: Zip FiiiAssist.Cli
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish/fiiiassist-cli/* -DestinationPath ./fiii-assist-cli-${{ steps.version.outputs.VERSION }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            ./fiii-assist-${{ steps.version.outputs.VERSION }}.zip
            ./fiii-assist-cli-${{ steps.version.outputs.VERSION }}.zip
